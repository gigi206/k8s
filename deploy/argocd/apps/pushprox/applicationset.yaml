---
# =============================================================================
# PushProx ApplicationSet (CIS 1.3.7 / 1.4.2 compliance)
# =============================================================================
# Deploys PushProx proxy+client for kube-controller-manager and kube-scheduler
# so Prometheus can scrape metrics via localhost relay instead of bind-address=0.0.0.0.
#
# Architecture:
#   Prometheus -> PushProx Proxy (Deployment) <- PushProx Client (DaemonSet, hostNetwork)
#                                                -> localhost:10257/10259 (HTTPS)
#
# Chart: devopstales/pushprox (fork of rancher-pushprox)
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: pushprox
  namespace: argo-cd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  generators:
    - merge:
        mergeKeys:
          - environment
        generators:
          - git:
              repoURL: https://github.com/gigi206/k8s
              revision: 'HEAD'
              files:
                - path: deploy/argocd/config/config.yaml
          - git:
              repoURL: https://github.com/gigi206/k8s
              revision: 'HEAD'
              files:
                - path: deploy/argocd/apps/pushprox/config/*.yaml

  template:
    metadata:
      name: pushprox
      namespace: argo-cd
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: monitoring
      syncPolicy:
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 10m

  templatePatch: |
    spec:
      {{- if .features.monitoring.enabled }}
      sources:
        # PushProx for kube-controller-manager (CIS 1.3.7)
        - repoURL: https://devopstales.github.io/helm-charts
          targetRevision: '{{ .pushprox.version }}'
          chart: pushprox
          helm:
            releaseName: pushprox-kube-controller-manager
            valuesObject:
              component: kube-controller-manager
              metricsPort: 10257
              serviceMonitor:
                enabled: true
                endpoints:
                  - port: metrics
                    relabelings:
                      - action: replace
                        sourceLabels: [__meta_kubernetes_pod_node_name]
                        targetLabel: instance
              clients:
                enabled: true
                port: 10011
                useLocalhost: true
                https:
                  enabled: true
                  useServiceAccountCredentials: true
                  insecureSkipVerify: true
                nodeSelector:
                  node-role.kubernetes.io/control-plane: "true"
                tolerations:
                  - effect: NoExecute
                    operator: Exists
                  - effect: NoSchedule
                    operator: Exists
                resources:
                  requests:
                    cpu: 5m
                    memory: 16Mi
                  limits:
                    cpu: 50m
                    memory: 32Mi
              proxy:
                enabled: true
                port: 8080
                resources:
                  requests:
                    cpu: 5m
                    memory: 16Mi
                  limits:
                    cpu: 50m
                    memory: 32Mi
        # PushProx for kube-scheduler (CIS 1.4.2)
        - repoURL: https://devopstales.github.io/helm-charts
          targetRevision: '{{ .pushprox.version }}'
          chart: pushprox
          helm:
            releaseName: pushprox-kube-scheduler
            valuesObject:
              component: kube-scheduler
              metricsPort: 10259
              serviceMonitor:
                enabled: true
                endpoints:
                  - port: metrics
                    relabelings:
                      - action: replace
                        sourceLabels: [__meta_kubernetes_pod_node_name]
                        targetLabel: instance
              clients:
                enabled: true
                port: 10012
                useLocalhost: true
                https:
                  enabled: true
                  useServiceAccountCredentials: true
                  insecureSkipVerify: true
                nodeSelector:
                  node-role.kubernetes.io/control-plane: "true"
                tolerations:
                  - effect: NoExecute
                    operator: Exists
                  - effect: NoSchedule
                    operator: Exists
                resources:
                  requests:
                    cpu: 5m
                    memory: 16Mi
                  limits:
                    cpu: 50m
                    memory: 32Mi
              proxy:
                enabled: true
                port: 8080
                resources:
                  requests:
                    cpu: 5m
                    memory: 16Mi
                  limits:
                    cpu: 50m
                    memory: 32Mi
      {{- end }}

      syncPolicy:
        syncOptions:
        {{- range .syncPolicy.syncOptions }}
        - {{ . }}
        {{- end }}
      {{- if .syncPolicy.automated.enabled }}
        automated:
          prune: {{ .syncPolicy.automated.prune }}
          selfHeal: {{ .syncPolicy.automated.selfHeal }}
      {{- end }}
