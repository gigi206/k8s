---
# =============================================================================
# GlobalNetworkPolicy - Default Deny Pod Ingress (Zero Trust) (Canal)
# =============================================================================
# Implements Zero Trust networking by blocking ALL pod-to-pod ingress by default.
# Only explicitly allowed traffic passes.
#
# BASELINE ALLOWS (minimal for cluster operation):
# - Health probes from kubelet (host)
# - Traffic from kube-system (DNS, metrics-server, CNI)
#
# EXCLUDED: kube-system, kube-public, kube-node-lease
# (Canal runs in kube-system, unlike Calico which runs in calico-system)
#
# IMPORTANT: Uses projectcalico.org/namespace to select only workload endpoints.
# See default-deny-external-egress.yaml for details on why has(kubernetes-host)
# cannot be used with auto-created HostEndpoints.
#
# Canal equivalent of: apps/calico/resources/default-deny-pod-ingress.yaml
# =============================================================================

apiVersion: crd.projectcalico.org/v1
kind: GlobalNetworkPolicy
metadata:
  name: default-deny-pod-ingress
spec:
  order: 500
  selector: >-
    has(projectcalico.org/namespace) &&
    projectcalico.org/namespace not in {"kube-system", "kube-public", "kube-node-lease"}
  types: [Ingress]
  ingress:
    # Rule 1: Allow health checks from kubelet (host endpoints)
    - action: Allow
      source:
        selector: "!has(projectcalico.org/namespace)"
    # Rule 2: Allow from kube-system (essential cluster services: DNS, metrics-server, CNI)
    - action: Allow
      source:
        namespaceSelector: kubernetes.io/metadata.name == "kube-system"
    # NO OTHER RULES = ALL OTHER INGRESS DENIED
    # Per-app NetworkPolicy must explicitly allow traffic
