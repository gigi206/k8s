---
# =============================================================================
# ClusterPolicy: Disable ServiceAccount Token Automount
# =============================================================================
# Mutates workloads to set automountServiceAccountToken: false by default.
# Applications that need K8s API access must create a PolicyException.
#
# CIS Kubernetes Benchmark 5.1.6:
# "Ensure that Service Account Tokens are only mounted where necessary"
#
# Two rules are required:
# 1. Controller rule: mutates Deployment/StatefulSet/DaemonSet/Job/CronJob
#    templates so the SA admission controller never injects the token volume.
# 2. Pod rule: catches standalone pods (kubectl run, static pods, etc.)
#    Note: Pod-only mutation is insufficient for controller-managed pods
#    because the SA admission controller injects the token volume BEFORE
#    the Kyverno webhook runs, so the token remains accessible even when
#    automountServiceAccountToken is set to false on the pod.
#
# Pattern: Each app that needs K8s API access creates its own PolicyException
# in its resources/ directory (e.g., kyverno-policy-exception.yaml)
# =============================================================================
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disable-automount-sa-token
  annotations:
    policies.kyverno.io/title: Disable Automount ServiceAccount Token
    policies.kyverno.io/category: Security Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod, Deployment, StatefulSet, DaemonSet, Job, CronJob
    policies.kyverno.io/description: >-
      Kubernetes automatically mounts ServiceAccount tokens in pods, which can
      be exploited if a pod is compromised. This policy mutates workloads to disable
      automatic token mounting. Controller-managed workloads are mutated at the
      template level to prevent the SA admission controller from injecting the
      token volume. Applications requiring K8s API access must define a PolicyException.
spec:
  # Kyverno defaults (explicit to avoid OutOfSync)
  admission: true
  emitWarning: false
  validationFailureAction: Audit
  # Mutate existing resources on policy update
  mutateExistingOnPolicyUpdate: false
  # Apply to new resources only (not existing)
  background: false
  rules:
    # =================================================================
    # Rule 1: Controller-managed workloads (Deployment, StatefulSet, etc.)
    # Mutates spec.template.spec so the token volume is never created.
    # =================================================================
    - name: disable-automount-sa-token-controllers
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
              operations:
                - CREATE
                - UPDATE
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
          - resources:
              namespaces:
                - kyverno
          - resources:
              namespaces:
                - cilium-spire
          - resources:
              selector:
                matchLabels:
                  kyverno.io/exclude-sa-token: "true"
      mutate:
        patchStrategicMerge:
          spec:
            template:
              spec:
                automountServiceAccountToken: false
    # =================================================================
    # Rule 2: Standalone pods (kubectl run, static pods, etc.)
    # Safety net for pods not managed by a controller.
    # =================================================================
    - name: disable-automount-sa-token-pods
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
          - resources:
              namespaces:
                - kyverno
          - resources:
              namespaces:
                - cilium-spire
          - resources:
              selector:
                matchLabels:
                  kyverno.io/exclude-sa-token: "true"
      mutate:
        patchStrategicMerge:
          spec:
            automountServiceAccountToken: false
