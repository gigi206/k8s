---
# =============================================================================
# CiliumBGPClusterConfig - BGP peering for LoadBalancer IPs
# =============================================================================
# Cilium v1.19+ BGP Control Plane configuration.
# Replaces the deprecated CiliumBGPPeeringPolicy (v2alpha1).
#
# Defines a BGP instance on each node with peers pointing to the FRR upstream
# routers. The peer references a CiliumBGPPeerConfig for session settings.
# Route advertisement is handled by a separate CiliumBGPAdvertisement resource.
#
# Placeholders are patched via Kustomize in the ApplicationSet.
# =============================================================================

apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: cilium-bgp
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  bgpInstances:
    - name: "cilium-lb-peering"
      localASN: 64512
      peers:
        # Placeholder - patched by ApplicationSet from config.yaml bgp.peers
        - name: "frr-peer-1"
          peerASN: 65000
          peerAddress: "PLACEHOLDER_PEER_ADDRESS"
          peerConfigRef:
            name: "cilium-bgp-peer"
