---
# PolicyException for Jaeger - requires K8s API for trace collection and storage
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: jaeger-automount-sa-token
  namespace: jaeger
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  exceptions:
    - policyName: disable-automount-sa-token
      ruleNames:
        - disable-automount-sa-token-controllers
        - disable-automount-sa-token-pods
  match:
    any:
      - resources:
          namespaces:
            - jaeger
          kinds:
            - Pod
            - Deployment
            - DaemonSet
            - StatefulSet
            - Job
            - CronJob
