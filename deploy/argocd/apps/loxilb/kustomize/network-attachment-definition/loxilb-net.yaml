---
# =============================================================================
# NetworkAttachmentDefinition for LoxiLB
# =============================================================================
# Creates a macvlan interface on eth1 for LoxiLB pods
# This isolates LoxiLB eBPF traffic from Cilium-managed interfaces
# Uses Whereabouts IPAM for cluster-wide IP allocation
#
# Reference: https://docs.loxilb.io/latest/cilium-incluster/
# =============================================================================
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: loxilb-net
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "loxilb-net",
      "type": "macvlan",
      "master": "eth1",
      "mode": "bridge",
      "ipam": {
        "type": "whereabouts",
        "range": "192.168.80.0/24",
        "gateway": "192.168.80.1",
        "exclude": [
          "192.168.80.1/32"
        ]
      }
    }
