---
# =============================================================================
# KubeVirt ApplicationSet (Virtualization)
# =============================================================================
# Deploie KubeVirt (operateur + CR), CDI (operateur + CR),
# kubevirt-manager (UI), et les configurations reseau/monitoring associees
# Docs: https://kubevirt.io/
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kubevirt
  namespace: argo-cd
  annotations:
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  generators:
    - merge:
        mergeKeys:
          - environment
        generators:
          # Config de base (valeurs par defaut)
          - git:
              repoURL: https://github.com/gigi206/k8s
              revision: 'HEAD'
              files:
                - path: deploy/argocd/config/config.yaml

          # Config specifique a l'application
          - git:
              repoURL: https://github.com/gigi206/k8s
              revision: 'HEAD'
              files:
                - path: deploy/argocd/apps/kubevirt/config/*.yaml

  template:
    metadata:
      name: kubevirt
      namespace: argo-cd
      annotations:
    spec:
      project: default

      sources: []

      destination:
        server: https://kubernetes.default.svc
        namespace: kubevirt

      syncPolicy:
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 10m

  templatePatch: |
    spec:
      # Ignore fields managed by KubeVirt/CDI controllers
      ignoreDifferences:
        - group: kubevirt.io
          kind: KubeVirt
          jqPathExpressions:
            - .status
            - .spec.configuration
        - group: cdi.kubevirt.io
          kind: CDI
          jqPathExpressions:
            - .status
            - .spec.config
      syncPolicy:
        syncOptions:
        {{- range .syncPolicy.syncOptions }}
          - {{ . }}
        {{- end }}
      {{- if .syncPolicy.automated.enabled }}
        automated:
          prune: {{ .syncPolicy.automated.prune }}
          selfHeal: {{ .syncPolicy.automated.selfHeal }}
      {{- end }}
      sources:
        {{- if .rke2.cis.enabled }}
        # Source: Namespace kubevirt with PSA labels for CIS profile compatibility
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "namespace.yaml"
        {{- end }}

        {{- if .rke2.cis.enabled }}
        # Source: Namespace cdi with PSA labels for CIS profile compatibility
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "namespace-cdi.yaml"
        {{- end }}

        {{- if .features.kyverno.enabled }}
        # Source: Kyverno PolicyException kubevirt (allows SA token mount for K8s API access)
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "kyverno-policy-exception.yaml"
        {{- end }}

        {{- if .features.kyverno.enabled }}
        # Source: Kyverno PolicyException cdi (allows SA token mount for K8s API access)
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "kyverno-policy-exception-cdi.yaml"
        {{- end }}

        # Source: KubeVirt Operator (CRDs + Deployment)
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/kustomize/kubevirt-operator

        # Source: CDI Operator (CRDs + Deployment)
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/kustomize/cdi-operator

        # Source: KubeVirt CR (with env-specific patches for emulation and live migration)
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/kustomize/kubevirt-cr
          kustomize:
            patches:
              - target:
                  kind: KubeVirt
                  name: kubevirt
                patch: |
                  - op: replace
                    path: /spec/configuration/developerConfiguration/useEmulation
                    value: {{ .features.kubevirt.emulation }}
                  - op: replace
                    path: /spec/configuration/migrations/parallelMigrationsPerCluster
                    value: {{ .kubevirt.liveMigration.parallelMigrationsPerCluster }}
                  - op: replace
                    path: /spec/configuration/migrations/parallelOutboundMigrationsPerNode
                    value: {{ .kubevirt.liveMigration.parallelOutboundMigrationsPerNode }}
                  - op: replace
                    path: /spec/configuration/migrations/bandwidthPerMigration
                    value: "{{ .kubevirt.liveMigration.bandwidthPerMigration }}"

        # Source: CDI CR (Containerized Data Importer)
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "cdi-cr.yaml"

        {{- if .cni.multus.enabled }}
        # Source: Multus NetworkAttachmentDefinition (bridge for VM networking)
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/kustomize/network-attachment-definition
        {{- end }}

        # Source: kubevirt-manager Helm chart (Web UI)
        - repoURL: https://charts.christianhuth.de
          targetRevision: '{{ .kubevirt.manager.version }}'
          chart: kubevirt-manager
          helm:
            releaseName: kubevirt-manager
            valuesObject:
              image:
                tag: '{{ .kubevirt.manager.appVersion }}'
              service:
                type: ClusterIP
                port: 8080

        {{- if .features.networkPolicy.defaultDenyPodIngress.enabled }}
          {{- if eq .cni.primary "cilium" }}
        # Source: Cilium internal ingress policy (pod-to-pod communication)
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "cilium-ingress-policy.yaml"
          {{- else if or (eq .cni.primary "calico") (eq .cni.primary "canal") }}
        # Source: Calico internal ingress policy (pod-to-pod communication)
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "calico-ingress-policy.yaml"
          {{- end }}
        {{- end }}

        {{- if .features.networkPolicy.egressPolicy.enabled }}
          {{- if eq .cni.primary "cilium" }}
        # Source: Cilium egress policy
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "cilium-egress-policy.yaml"
          {{- else if or (eq .cni.primary "calico") (eq .cni.primary "canal") }}
        # Source: Calico egress policy
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "calico-egress-policy.yaml"
          {{- end }}
        {{- end }}

        {{- if .features.networkPolicy.ingressPolicy.enabled }}
          {{- if eq .cni.primary "cilium" }}
        # Source: Cilium ingress policy - conditional per Gateway provider
        {{- if eq .features.gatewayAPI.controller.provider "envoy-gateway" }}
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "cilium-ingress-policy-envoy-gateway.yaml"
        {{- else if eq .features.gatewayAPI.controller.provider "istio" }}
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "cilium-ingress-policy-istio.yaml"
        {{- else if eq .features.gatewayAPI.controller.provider "apisix" }}
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "cilium-ingress-policy-apisix.yaml"
        {{- else if eq .features.gatewayAPI.controller.provider "traefik" }}
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "cilium-ingress-policy-traefik.yaml"
        {{- else if eq .features.gatewayAPI.controller.provider "nginx-gwf" }}
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "cilium-ingress-policy-nginx-gwf.yaml"
        {{- else if eq .features.gatewayAPI.controller.provider "cilium" }}
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "cilium-ingress-policy-cilium.yaml"
        {{- end }}
          {{- else if or (eq .cni.primary "calico") (eq .cni.primary "canal") }}
        # Source: Calico ingress policy - conditional per Gateway provider
        {{- if eq .features.gatewayAPI.controller.provider "envoy-gateway" }}
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "calico-ingress-policy-envoy-gateway.yaml"
        {{- else if eq .features.gatewayAPI.controller.provider "istio" }}
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "calico-ingress-policy-istio.yaml"
        {{- else if eq .features.gatewayAPI.controller.provider "apisix" }}
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "calico-ingress-policy-apisix.yaml"
        {{- else if eq .features.gatewayAPI.controller.provider "traefik" }}
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "calico-ingress-policy-traefik.yaml"
        {{- else if eq .features.gatewayAPI.controller.provider "nginx-gwf" }}
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "calico-ingress-policy-nginx-gwf.yaml"
        {{- else if eq .features.gatewayAPI.controller.provider "cilium" }}
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/resources
          directory:
            include: "calico-ingress-policy-cilium.yaml"
        {{- end }}
          {{- end }}
        {{- end }}

        {{- if .features.gatewayAPI.enabled }}
        {{- if .features.gatewayAPI.httpRoute.enabled }}
        {{- if and .features.oauth2Proxy.enabled (eq .features.gatewayAPI.controller.provider "istio") }}
        # Source: HTTPRoute + OAuth2 AuthorizationPolicy for Istio (atomic deployment)
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/kustomize/httproute-oauth2-istio
          kustomize:
            patches:
              - target:
                  kind: HTTPRoute
                  name: kubevirt-manager
                patch: |
                  - op: replace
                    path: /spec/hostnames/0
                    value: kubevirt.{{ .common.domain }}
                  - op: replace
                    path: /spec/parentRefs/0/namespace
                    value: '{{ .features.gatewayAPI.controller.gatewayNamespace }}'
              - target:
                  kind: AuthorizationPolicy
                  name: oauth2-proxy-kubevirt-manager
                patch: |
                  - op: replace
                    path: /spec/rules/0/to/0/operation/hosts/0
                    value: kubevirt.{{ .common.domain }}
        {{- else if and .features.oauth2Proxy.enabled (eq .features.gatewayAPI.controller.provider "envoy-gateway") }}
        # Source: HTTPRoute + OAuth2 SecurityPolicy for Envoy Gateway (atomic deployment)
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/kustomize/httproute-oauth2-envoy-gateway
          kustomize:
            patches:
              - target:
                  kind: HTTPRoute
                  name: kubevirt-manager
                patch: |
                  - op: replace
                    path: /spec/hostnames/0
                    value: kubevirt.{{ .common.domain }}
                  - op: replace
                    path: /spec/parentRefs/0/namespace
                    value: '{{ .features.gatewayAPI.controller.gatewayNamespace }}'
              - target:
                  group: gateway.envoyproxy.io
                  kind: Backend
                  name: backend-keycloak
                patch: |
                  - op: replace
                    path: /spec/endpoints/0/fqdn/hostname
                    value: keycloak.{{ .common.domain }}
              - target:
                  group: gateway.envoyproxy.io
                  kind: SecurityPolicy
                  name: oidc-kubevirt-manager
                patch: |
                  - op: replace
                    path: /spec/oidc/provider/issuer
                    value: https://keycloak.{{ .common.domain }}/realms/k8s
                  - op: replace
                    path: /spec/oidc/provider/authorizationEndpoint
                    value: https://keycloak.{{ .common.domain }}/realms/k8s/protocol/openid-connect/auth
                  - op: replace
                    path: /spec/oidc/provider/tokenEndpoint
                    value: https://keycloak.{{ .common.domain }}/realms/k8s/protocol/openid-connect/token
                  - op: replace
                    path: /spec/oidc/redirectURL
                    value: https://kubevirt.{{ .common.domain }}/oauth2/callback
        {{- else if and .features.oauth2Proxy.enabled (eq .features.gatewayAPI.controller.provider "traefik") }}
        # Source: HTTPRoute (Traefik - OAuth2 via Middleware in-route, fail-close)
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/kustomize/httproute
          kustomize:
            patches:
              - target:
                  kind: HTTPRoute
                  name: kubevirt-manager
                patch: |
                  - op: replace
                    path: /spec/hostnames/0
                    value: kubevirt.{{ .common.domain }}
                  - op: replace
                    path: /spec/parentRefs/0/namespace
                    value: '{{ .features.gatewayAPI.controller.gatewayNamespace }}'
                  - op: add
                    path: /spec/rules/0
                    value:
                      matches:
                        - path:
                            type: PathPrefix
                            value: /oauth2/
                      backendRefs:
                        - group: ""
                          kind: Service
                          name: oauth2-proxy
                          namespace: oauth2-proxy
                          port: 4180
                          weight: 1
                  - op: add
                    path: /spec/rules/1/filters
                    value:
                      - type: ExtensionRef
                        extensionRef:
                          group: traefik.io
                          kind: Middleware
                          name: oauth2-proxy-auth
        # Source: Traefik Middleware + ReferenceGrant for OAuth2 Proxy forwardAuth
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/kustomize/oauth2-authz-traefik
        {{- else }}
        # Source: HTTPRoute standard (no OAuth2 or unsupported provider)
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/kustomize/httproute
          kustomize:
            patches:
              - target:
                  kind: HTTPRoute
                  name: kubevirt-manager
                patch: |
                  - op: replace
                    path: /spec/hostnames/0
                    value: kubevirt.{{ .common.domain }}
                  - op: replace
                    path: /spec/parentRefs/0/namespace
                    value: '{{ .features.gatewayAPI.controller.gatewayNamespace }}'
        {{- end }}
        {{- else if eq .features.gatewayAPI.controller.provider "apisix" }}
        # Source: APISIX native CRDs (when HTTPRoute disabled and provider is apisix)
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/kustomize/apisix
          kustomize:
            patches:
              - target:
                  kind: ApisixRoute
                  name: kubevirt-manager
                patch: |
                  - op: replace
                    path: /spec/http/0/match/hosts/0
                    value: kubevirt.{{ .common.domain }}
        {{- end }}
        {{- end }}

        {{- if and .features.sso.enabled (eq .features.sso.provider "keycloak") }}
        # Source: Keycloak - Register OAuth2 Proxy redirect URIs for kubevirt-manager
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/kustomize/sso-keycloak
          kustomize:
            images:
              - 'curlimages/curl={{ .images.curl.repository }}:{{ .images.curl.tag }}'
            patches:
              - target:
                  kind: Job
                  name: kubevirt-oauth2-proxy-uris
                patch: |
                  - op: replace
                    path: /spec/template/spec/containers/0/env/0/value
                    value: {{ .common.domain }}
        {{- end }}

        {{- if .features.monitoring.enabled }}
        # Source: Prometheus monitoring (ServiceMonitors, PrometheusRules, dashboards)
        - repoURL: https://github.com/gigi206/k8s
          targetRevision: '{{ .git.revision }}'
          path: deploy/argocd/apps/kubevirt/kustomize/monitoring
          kustomize:
            commonLabels:
              release: '{{ .features.monitoring.release }}'
        {{- end }}
