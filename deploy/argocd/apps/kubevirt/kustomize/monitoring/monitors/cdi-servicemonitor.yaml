---
# =============================================================================
# CDI (Containerized Data Importer) ServiceMonitor for Prometheus
# =============================================================================
# Scrapes metrics from CDI components (cdi-operator, cdi-controller,
# cdi-apiserver) via the cdi-metrics-service
# Docs: https://kubevirt.io/user-guide/monitoring/metrics/
#
# Note: The 'release' label is injected by Kustomize via commonLabels
#       from features.monitoring.release in config.yaml
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cdi
  namespace: cdi
spec:
  namespaceSelector:
    matchNames:
    - cdi
  selector:
    matchLabels:
      app.kubernetes.io/name: cdi-metrics
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
