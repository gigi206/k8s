---
# =============================================================================
# KubeVirt Custom Resource
# =============================================================================
# Configures the KubeVirt installation in the cluster
# Environment-specific values (emulation, migration params) are injected via
# kustomize patches in the ApplicationSet definition (Go templates work there)
#
# Key configuration:
# - Live migration enabled with LiveMigrate workload update strategy
# - RKE2 tolerations for etcd and control-plane nodes (kubevirt#14429)
# - Default migration parameters (overridden per environment via patches)
# =============================================================================
apiVersion: kubevirt.io/v1
kind: KubeVirt
metadata:
  name: kubevirt
  namespace: kubevirt
spec:
  imagePullPolicy: IfNotPresent
  workloadUpdateStrategy:
    workloadUpdateMethods:
      - LiveMigrate
  configuration:
    vmRolloutStrategy: LiveUpdate
    developerConfiguration:
      useEmulation: false
    migrations:
      parallelMigrationsPerCluster: 5
      parallelOutboundMigrationsPerNode: 2
      bandwidthPerMigration: "64Mi"
      completionTimeoutPerGiB: 800
      progressTimeout: 150
  infra:
    nodePlacement:
      tolerations:
        - key: node-role.kubernetes.io/etcd
          operator: Exists
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
