---
# =============================================================================
# CiliumNetworkPolicy - KubeVirt Manager Ingress from NGINX Gateway Fabric
# =============================================================================
# Allows access to KubeVirt Manager web UI from NGINX Gateway Fabric
# Internal communication is handled by cilium-ingress-policy.yaml
# =============================================================================
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kubevirt-ingress-nginx-gwf
  namespace: kubevirt
spec:
  description: "Allow ingress to KubeVirt Manager from NGINX Gateway Fabric"
  endpointSelector: {}  # Applies to all pods in kubevirt namespace

  ingress:
    # Allow from NGINX Gateway Fabric (nginx-gateway namespace)
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: nginx-gateway
      toPorts:
        - ports:
            - port: "8080"    # KubeVirt Manager HTTP
              protocol: TCP
