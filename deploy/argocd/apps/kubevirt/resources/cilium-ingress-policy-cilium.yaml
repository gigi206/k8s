---
# =============================================================================
# CiliumNetworkPolicy - KubeVirt Manager Ingress from Cilium Gateway
# =============================================================================
# Allows access to KubeVirt Manager web UI from Cilium Gateway
# Internal communication is handled by cilium-ingress-policy.yaml
# =============================================================================
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kubevirt-ingress-cilium
  namespace: kubevirt
spec:
  description: "Allow ingress to KubeVirt Manager from Cilium Gateway"
  endpointSelector: {}  # Applies to all pods in kubevirt namespace

  ingress:
    # Allow from Cilium Gateway (reserved:ingress identity)
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "8080"    # KubeVirt Manager HTTP
              protocol: TCP
