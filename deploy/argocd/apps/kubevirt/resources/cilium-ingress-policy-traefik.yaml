---
# =============================================================================
# CiliumNetworkPolicy - KubeVirt Manager Ingress from Traefik Gateway
# =============================================================================
# Allows access to KubeVirt Manager web UI from Traefik Gateway
# Internal communication is handled by cilium-ingress-policy.yaml
# =============================================================================
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kubevirt-ingress-traefik
  namespace: kubevirt
spec:
  description: "Allow ingress to KubeVirt Manager from Traefik Gateway"
  endpointSelector: {}  # Applies to all pods in kubevirt namespace

  ingress:
    # Allow from Traefik Gateway (traefik namespace)
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8080"    # KubeVirt Manager HTTP
              protocol: TCP
