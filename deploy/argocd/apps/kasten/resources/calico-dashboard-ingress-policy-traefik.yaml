---
# =============================================================================
# Calico NetworkPolicy - Kasten K10 Dashboard Ingress from Traefik
# =============================================================================
apiVersion: crd.projectcalico.org/v1
kind: NetworkPolicy
metadata:
  name: kasten-dashboard-ingress-traefik
  namespace: kasten-io
spec:
  selector: component == "gateway"
  types:
    - Ingress
  ingress:
    - action: Allow
      protocol: TCP
      source:
        namespaceSelector: 'kubernetes.io/metadata.name == "traefik"'
      destination:
        ports:
          - 8000
