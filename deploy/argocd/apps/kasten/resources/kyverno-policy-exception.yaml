---
# PolicyException for Kasten K10 - requires K8s API access for backup/restore operations
# and SA token mount for RBAC-based cluster administration
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: kasten-automount-sa-token
  namespace: kasten-io
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  exceptions:
    - policyName: disable-automount-sa-token
      ruleNames:
        - disable-automount-sa-token-controllers
        - disable-automount-sa-token-pods
  match:
    any:
      - resources:
          namespaces:
            - kasten-io
          kinds:
            - Pod
            - Deployment
            - DaemonSet
            - StatefulSet
            - Job
            - CronJob
