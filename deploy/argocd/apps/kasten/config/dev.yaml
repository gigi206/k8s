---
# Configuration Kasten K10 - Dev
# Single instance, minimal resources
environment: dev
appName: kasten

kasten:
  namespace: kasten-io
  version: "8.5.7"  # Helm chart version - Renovate will update this

  # EULA acceptance (required)
  eula:
    company: "k8s-dev"
    email: "admin@k8s.local"

  # Resources (K10 services)
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

  # Multi-cluster menu visibility
  multicluster:
    enabled: true

  # Persistence
  persistence:
    storageClass: ceph-block
    size: 1Gi
    meteringSize: 1Gi

# Grafana dashboard folder
dashboard:
  folder: "Kasten"

syncPolicy:
  automated:
    enabled: true
    prune: true
    selfHeal: true
