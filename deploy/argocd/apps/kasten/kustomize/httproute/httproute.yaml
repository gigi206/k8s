---
# =============================================================================
# HTTPRoute for Kasten K10 Dashboard via Gateway API
# =============================================================================
# Routes traffic to K10 gateway service (port 80 -> targetPort 8000)
# K10 serves on /k10/ prefix, so we redirect / -> /k10/
# Deployed when features.gatewayAPI.httpRoute.enabled: true
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kasten
  namespace: kasten-io
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-cluster-issuer
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: default-gateway
      namespace: PLACEHOLDER_GATEWAY_NS  # Patched via Kustomize from gatewayAPI.controller.gatewayNamespace
      sectionName: https
  hostnames:
    - "kasten.PLACEHOLDER.example.com"  # Patched via Kustomize from common.domain
  rules:
    # Redirect / to /k10/
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /k10/
            statusCode: 302
    # Route /k10/* to K10 gateway service
    - matches:
        - path:
            type: PathPrefix
            value: /k10
      backendRefs:
        - group: ""
          kind: Service
          name: gateway
          port: 80
          weight: 1
