---
# =============================================================================
# ExternalSecret - Sync Root CA from cert-manager
# =============================================================================
# Synchronise le certificat CA root depuis cert-manager vers kasten-io namespace.
# Ce CA est utilisé pour valider les certificats TLS des endpoints OIDC (Keycloak).
# =============================================================================

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: root-ca-external
  namespace: kasten-io
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: cert-manager-ca-secrets
  target:
    name: root-ca
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: root-ca
          app.kubernetes.io/part-of: kasten
  data:
    - secretKey: ca.crt
      remoteRef:
        key: root-ca-secret
        property: tls.crt
---
# =============================================================================
# Job - Create ConfigMap from root-ca Secret for K10 cacertconfigmap
# =============================================================================
# K10 requires a ConfigMap (not Secret) for custom CA trust via
# cacertconfigmap Helm value. This Job copies the CA cert from the
# root-ca Secret (created by ExternalSecret) into a ConfigMap.
# =============================================================================

apiVersion: batch/v1
kind: Job
metadata:
  name: kasten-ca-configmap
  namespace: kasten-io
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        kyverno.io/exclude-sa-token: "true"
    spec:
      restartPolicy: OnFailure
      serviceAccountName: kasten-credentials-job
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: create-configmap
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          image: docker.io/bitnami/kubectl:latest
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "Waiting for root-ca Secret..."
              until kubectl get secret root-ca -n kasten-io >/dev/null 2>&1; do
                echo "  Secret not found, retrying in 5s..."
                sleep 5
              done

              echo "Creating ConfigMap k10-custom-ca from root-ca Secret..."
              CA_CERT=$(kubectl get secret root-ca -n kasten-io -o jsonpath='{.data.ca\.crt}' | base64 -d)
              kubectl create configmap k10-custom-ca \
                --namespace=kasten-io \
                --from-literal=custom-ca-bundle.pem="$CA_CERT" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "ConfigMap k10-custom-ca created/updated."
